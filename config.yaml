mode: backtest             # live | backtest

backtest:
  start_date: "2025-10-10" # 回测开始日期
  end_date: "2026-04-10"   # 回测结束日期
  initial_balance: 2000.0 # 初始资金（null 则使用账户实际余额）

mt5:
  login: 111111          # 替换为你的账号
  password: "111111" # 替换为你的密码
  server: "111111"  # 替换为你的经纪商服务器

symbols:
  - BTCUSDm
  - XAUUSDm

timeframe: M15             # 15分钟

indicators:
  hma:
    length1: 50
    length2: 100
    length3: 200
    source: close
  blackflag:
    trail_type: modified
    atr_period: 10
    atr_factor: 3.5        # 原 3.0; 调大止损弹性，减少 BTC/XAU 剧烈波动中的假止损
  adx:
    enabled: true
    period: 14
    threshold: 20.0        # ADX < 20 视为横盘震荡，过滤假信号；可调至 25 进一步收紧

risk:
  risk_per_trade_pct: 1.0  # 每单风险占账户余额的百分比
  rr_ratio: 2.0            # 止盈/止损比例

scheduler:
  poll_interval_seconds: 30  # 每隔多少秒检查一次新K线
  warmup_bars: 300           # 启动时拉取多少根历史K线用于指标计算
